<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Store - اطلب الآن</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --accent-color: #27ae60;
    --bg-light: #f8f9fa;
}

body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--bg-light);
}

/* LOGO */
.logo-container {
    background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
    padding: 25px;
    text-align: center;
    color: white;
}

.logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
}

.logo-title span {
    color: #00ffcc;
}

.logo-sub {
    font-size: 13px;
    opacity: 0.8;
}

.logo-badge {
    margin-top: 10px;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    background: #00ffcc;
    color: #000;
    font-weight: bold;
    font-size: 12px;
}

/* Counter */
.counter {
    color: #e74c3c;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

/* Card */
.card-product {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    margin-bottom: 30px;
}

.product-img {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    border-radius: 10px;
}

.price-new {
    color: var(--accent-color);
    font-size: 1.8rem;
    font-weight: bold;
}

.price-old {
    text-decoration: line-through;
    color: gray;
    margin-right: 10px;
}

.btn-order {
    background: linear-gradient(45deg,#27ae60,#2ecc71);
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 8px;
    font-weight: bold;
    font-size: 1.2rem;
    transition: 0.3s;
    margin-top: 10px;
}

.btn-order:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
}

.form-control, .form-select {
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="logo-container">
    <div class="logo-title">Zenix <span>Store</span></div>
    <div class="logo-sub">by AMINE OV</div>
    <div class="logo-badge">Premium Shop</div>
</div>

<p class="counter"><i class="fas fa-fire"></i> أكثر من 27 طلب اليوم!</p>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-product">
                <img src="https://via.placeholder.com/600x600.png?text=Product+Image" class="product-img" alt="Product">

                <h4 class="mt-3">اسم المنتج الاحترافي</h4>
                <div class="mb-2 text-warning">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                    <span class="text-muted small">(124 تقييم)</span>
                </div>

                <p class="text-muted">
                    منتج عالي الجودة مصمم ليعطيك أفضل تجربة يومية. 
                    مناسب للاستعمال اليومي ويدوم طويلاً.
                </p>

                <div class="mb-3">
                    <span class="price-new">5500 دج</span>
                    <span class="price-old">8900 دج</span>
                </div>

                <ul class="list-unstyled mb-4">
                    <li><i class="fas fa-check-circle text-success"></i> توصيل سريع لـ 58 ولاية</li>
                    <li><i class="fas fa-check-circle text-success"></i> الدفع عند الاستلام (حتى تفركس سلعتك)</li>
                </ul>

                <div class="bg-light p-3 rounded shadow-sm">
                    <h5 class="mb-3 text-center">أدخل معلوماتك للطلب</h5>
                    
                    <input type="text" id="name" class="form-control" placeholder="الاسم الكامل">
                    <input type="tel" id="phone" class="form-control" placeholder="رقم الهاتف">
                    
                    <select id="wilaya" class="form-select">
                        <option value="">اختر الولاية</option>
                        <option>01 - أدرار</option> <option>02 - الشلف</option> <option>03 - الأغواط</option>
                        <option>04 - أم البواقي</option> <option>05 - باتنة</option> <option>06 - بجاية</option>
                        <option>07 - بسكرة</option> <option>08 - بشار</option> <option>09 - البليدة</option>
                        <option>10 - البويرة</option> <option>11 - تمنراست</option> <option>12 - تبسة</option>
                        <option>13 - تلمسان</option> <option>14 - تيارت</option> <option>15 - تيزي وزو</option>
                        <option>16 - الجزائر</option> <option>17 - الجلفة</option> <option>18 - جيجل</option>
                        <option>19 - سطيف</option> <option>20 - سعيدة</option> <option>21 - سكيكدة</option>
                        <option>22 - سيدي بلعباس</option> <option>23 - عنابة</option> <option>24 - قالمة</option>
                        <option>25 - قسنطينة</option> <option>26 - المدية</option> <option>27 - مستغانم</option>
                        <option>28 - المسيلة</option> <option>29 - معسكر</option> <option>30 - ورقلة</option>
                        <option>31 - وهران</option> <option>32 - البيض</option> <option>33 - إليزي</option>
                        <option>34 - برج بوعريريج</option> <option>35 - بومرداس</option> <option>36 - الطارف</option>
                        <option>37 - تندوف</option> <option>38 - تسمسيلت</option> <option>39 - الوادي</option>
                        <option>40 - خنشلة</option> <option>41 - سوق أهراس</option> <option>42 - تيبازة</option>
                        <option>43 - ميلة</option> <option>44 - عين الدفلى</option> <option>45 - النعامة</option>
                        <option>46 - عين تموشنت</option> <option>47 - غرداية</option> <option>48 - غليزان</option>
                        <option>49 - تيميمون</option> <option>50 - برج باجي مختار</option> <option>51 - أولاد جلال</option>
                        <option>52 - بني عباس</option> <option>53 - عين صالح</option> <option>54 - عين قزام</option>
                        <option>55 - تقرت</option> <option>56 - جانت</option> <option>57 - المغير</option>
                        <option>58 - المنيعة</option>
                    </select>

                    <input type="text" id="commune" class="form-control" placeholder="البلدية">

                    <button class="btn-order" onclick="submitOrder()">
                        <i class="fas fa-shopping-cart"></i> أطلب الآن - 5500 دج
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function submitOrder() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const wilaya = document.getElementById('wilaya').value;
    const commune = document.getElementById('commune').value;

    if(name === "" || phone === "" || wilaya === "" || commune === "") {
        alert("يرجى ملء جميع الخانات لإتمام الطلب!");
        return;
    }

    if(phone.length < 10) {
        alert("يرجى إدخال رقم هاتف صحيح");
        return;
    }

    // هنا يمكنك إضافة كود إرسال البيانات إلى Google Sheets أو البريد الإلكتروني
    alert("شكراً لك يا " + name + "! تم استلام طلبك بنجاح، سنتصل بك قريباً لتأكيد التوصيل إلى " + wilaya);
    
    // لإفراغ الخانات بعد الطلب
    document.getElementById('name').value = "";
    document.getElementById('phone').value = "";
    document.getElementById('commune').value = "";
}
</script>

</body>
</html>
